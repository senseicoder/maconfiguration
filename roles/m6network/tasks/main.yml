---

- name: Corriger bug PyYAML 3.12/netplan 0.99 — CSafeLoader absent sur Ubuntu 18.04
  ansible.builtin.replace:
    path: /usr/share/netplan/netplan/configmanager.py
    regexp: 'yaml\.CSafeLoader'
    replace: 'yaml.SafeLoader'
  become: true

- name: Déployer la configuration netplan
  ansible.builtin.template:
    src: 01-network-manager-all.yaml.j2
    dest: /etc/netplan/01-network-manager-all.yaml
    owner: root
    group: root
    mode: "0600"
  become: true
  register: netplan_file

- name: Appliquer netplan (NM reprend eno1 et installe les routes)
  ansible.builtin.command: netplan apply
  become: true
  when: netplan_file is changed