---

- name: Déployer la configuration netplan
  ansible.builtin.copy:
    src: 01-network-manager-all.yaml
    dest: /etc/netplan/01-network-manager-all.yaml
    owner: root
    group: root
    mode: "0600"
  become: true
  register: netplan_file

- name: Appliquer les routes via M7 (netplan apply cassé sur Ubuntu 18.04)
  ansible.builtin.command: "ip route replace {{ item }} via 192.168.100.177"
  become: true
  loop:
    - 10.68.7.0/24
    - 10.40.9.0/24
    - 10.50.5.0/24
    - 10.40.5.0/24
