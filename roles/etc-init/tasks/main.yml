---
- name: verifier la presence du depot Mercurial /etc
  ansible.builtin.stat:
    path: /etc/.hg
  register: etc_hg_state

- name: verifier la presence du depot Git /etc
  ansible.builtin.stat:
    path: /etc/.git
  register: etc_git_state

- name: verifier la presence du fichier ignore Mercurial /etc
  ansible.builtin.stat:
    path: /etc/.hgignore
  register: etc_hgignore_state

- name: installer etckeeper
  ansible.builtin.apt:
    name:
      - etckeeper
      - git
    state: present
  become: true

- name: installer l'outil d'import Mercurial si necessaire
  ansible.builtin.apt:
    name:
      - mercurial
      - hg-fast-export
    state: present
  become: true
  when:
    - etc_hg_state.stat.exists
    - not etc_git_state.stat.exists

- name: verifier la presence de la configuration etckeeper
  ansible.builtin.stat:
    path: /etc/etckeeper/etckeeper.conf
  register: etckeeper_conf_state

- name: annoncer la configuration Git d'etckeeper
  ansible.builtin.debug:
    msg: 'etckeeper serait configure avec VCS="git" apres installation.'
  changed_when: true
  when:
    - ansible_check_mode
    - not etckeeper_conf_state.stat.exists

- name: configurer etckeeper avec Git
  ansible.builtin.lineinfile:
    path: /etc/etckeeper/etckeeper.conf
    regexp: '^VCS='
    line: 'VCS="git"'
  become: true
  when:
    - etckeeper_conf_state.stat.exists or not ansible_check_mode

- name: annoncer l'import Mercurial vers Git
  ansible.builtin.debug:
    msg: "L'historique Mercurial de /etc serait importe vers Git avec hg-fast-export."
  changed_when: true
  when:
    - ansible_check_mode
    - etc_hg_state.stat.exists
    - not etc_git_state.stat.exists

- name: importer l'historique Mercurial vers Git
  ansible.builtin.shell: |
    set -e
    cd /etc
    git init
    hg-fast-export -r /etc
    git reset --mixed HEAD
  args:
    creates: /etc/.git
  become: true
  when:
    - not ansible_check_mode
    - etc_hg_state.stat.exists
    - not etc_git_state.stat.exists

- name: verifier la presence du depot Mercurial apres import
  ansible.builtin.stat:
    path: /etc/.hg
  register: etc_hg_after_import_state

- name: annoncer l'archivage du depot Mercurial /etc
  ansible.builtin.debug:
    msg: "L'ancien depot /etc/.hg serait deplace vers /var/backups/etckeeper-migration/."
  changed_when: true
  when:
    - ansible_check_mode
    - etc_hg_after_import_state.stat.exists

- name: creer le dossier d'archive de migration etckeeper
  ansible.builtin.file:
    path: /var/backups/etckeeper-migration
    state: directory
    owner: root
    group: root
    mode: "0700"
  become: true
  when:
    - not ansible_check_mode
    - etc_hg_after_import_state.stat.exists or etc_hgignore_state.stat.exists

- name: archiver l'ancien depot Mercurial /etc
  ansible.builtin.command: mv /etc/.hg /var/backups/etckeeper-migration/etc.hg
  args:
    creates: /var/backups/etckeeper-migration/etc.hg
    removes: /etc/.hg
  become: true
  when:
    - not ansible_check_mode
    - etc_hg_after_import_state.stat.exists

- name: archiver l'ancien ignore Mercurial /etc
  ansible.builtin.command: mv /etc/.hgignore /var/backups/etckeeper-migration/etc.hgignore
  args:
    creates: /var/backups/etckeeper-migration/etc.hgignore
    removes: /etc/.hgignore
  become: true
  when:
    - not ansible_check_mode
    - etc_hgignore_state.stat.exists

- name: initialiser etckeeper sans historique Mercurial
  ansible.builtin.command: etckeeper init
  args:
    creates: /etc/.git
  become: true
  when:
    - not ansible_check_mode
    - not etc_hg_state.stat.exists

- name: annoncer l'initialisation etckeeper
  ansible.builtin.debug:
    msg: "etckeeper initialiserait un depot Git /etc."
  changed_when: true
  when:
    - ansible_check_mode
    - not etc_hg_state.stat.exists
    - not etc_git_state.stat.exists

- name: verifier l'etat Git de /etc
  ansible.builtin.command: git -C /etc status --porcelain
  register: etc_git_status
  changed_when: false
  failed_when: false
  check_mode: false
  become: true

- name: annoncer les changements /etc non commites
  ansible.builtin.debug:
    msg: "{{ etc_git_status.stdout_lines | length }} changement(s) /etc seraient visibles par etckeeper."
  changed_when: true
  when:
    - ansible_check_mode
    - etc_git_status.rc == 0
    - etc_git_status.stdout != ""
