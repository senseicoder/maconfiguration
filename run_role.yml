---
- hosts: all
  gather_facts: true

  vars:
    compte: cedric
    basedir: "/home/{{ compte }}"
    module_lang: fr_FR.UTF-8
    manual_file: "{{ basedir }}/manuel.sh"

  handlers:
    - name: ssh_restart
      ansible.builtin.service:
        name: ssh
        state: restarted
      become: true

    - name: docker_restart
      ansible.builtin.service:
        name: docker
        daemon_reload: true
        state: restarted
      become: true

    - name: syncthing_restart
      ansible.builtin.systemd:
        name: "syncthing@{{ compte }}"
        daemon_reload: true
        state: restarted
      become: true

    - name: cron_reload
      ansible.builtin.service:
        name: cron
        state: reloaded
      become: true

  pre_tasks:
    - name: Ensure manual command file exists
      ansible.builtin.copy:
        dest: "{{ manual_file }}"
        content: |
          #!/bin/bash
          # This script contains manual commands generated by maconfiguration.
        owner: "{{ compte }}"
        group: "{{ compte }}"
        mode: "0755"
        force: false

  roles:
    - role: "{{ role | basename }}"

